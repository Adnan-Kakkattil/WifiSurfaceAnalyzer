<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "Wi-Fi Attack Surface Analyzer" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur">
      <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-cyan-500 to-indigo-500"></div>
          <div>
            <div class="font-semibold leading-tight">Wi-Fi Attack Surface Analyzer</div>
            <div class="text-xs text-slate-400">Web UI • v{{ tool_version }}</div>
          </div>
        </div>
        <nav class="text-sm text-slate-300 flex items-center gap-4">
          <a class="hover:text-white" href="/">Home</a>
          <a class="hover:text-white" href="https://scapy.readthedocs.io/" target="_blank" rel="noreferrer">Scapy</a>
          <a class="hover:text-white" href="https://rich.readthedocs.io/" target="_blank" rel="noreferrer">Rich</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-6xl px-4 pb-10 text-xs text-slate-500">
      Use only on networks you own or have explicit permission to assess.
    </footer>
  </body>
</html>
